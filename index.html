<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dongbin Culture Warehouse Lv.3</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
      background: #dbe9f2;
      color: #3d2a17;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    body.is-player-open {
      padding: 0;
      display: block;
      overflow: hidden;
      background: #000;
    }

    .mission {
      position: relative;
      width: min(100vw, calc(100vh * 1122 / 1402));
      aspect-ratio: 1122 / 1402;
      background: url("level3.png") center / contain no-repeat;
      filter: drop-shadow(0 14px 34px rgba(45, 70, 90, 0.18));
    }

    .answer-form {
      position: absolute;
      inset: 0;
    }

    .answer-input {
      position: absolute;
      left: 21.7%;
      top: 75.15%;
      width: 56.4%;
      height: 4.7%;
      padding: 0 2%;
      border: 0;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: rgba(72, 64, 58, 0.88);
      font: inherit;
      font-size: clamp(18px, min(3.1vw, 3.9vh), 31px);
      font-weight: 850;
      line-height: 1;
      box-shadow: none;
      caret-color: rgba(67, 52, 39, 0.85);
      appearance: none;
      -webkit-appearance: none;
    }

    .answer-input::placeholder {
      color: transparent;
    }

    .answer-input:focus {
      box-shadow: none;
    }

    .answer-input:-webkit-autofill,
    .answer-input:-webkit-autofill:hover,
    .answer-input:-webkit-autofill:focus {
      -webkit-text-fill-color: rgba(72, 64, 58, 0.88);
      box-shadow: 0 0 0 1000px transparent inset;
      transition: background-color 9999s ease-in-out 0s;
    }

    .submit-hotspot {
      position: absolute;
      left: 19.2%;
      top: 84.4%;
      width: 61.9%;
      height: 7.5%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: transparent;
      cursor: pointer;
      font-size: 1px;
    }

    .submit-hotspot:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .hint-hotspot {
      position: absolute;
      right: 5.2%;
      top: 32.6%;
      width: 21.2%;
      height: 21.5%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: transparent;
      cursor: help;
      font-size: 1px;
      z-index: 2;
    }

    .hint-hotspot:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .mascot-hotspot {
      position: absolute;
      left: 31%;
      top: 26%;
      width: 38%;
      height: 31%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: transparent;
      cursor: pointer;
      font-size: 1px;
      z-index: 2;
    }

    .mascot-hotspot:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .hint-bubble {
      position: absolute;
      left: 58%;
      top: 25.5%;
      width: min(31%, 220px);
      padding: 12px 14px;
      border: 2px solid rgba(141, 109, 73, 0.38);
      border-radius: 8px;
      background: rgba(255, 250, 239, 0.94);
      color: #5a3f26;
      cursor: pointer;
      font-size: clamp(12px, min(1.8vw, 2.25vh), 16px);
      font-family: inherit;
      font-weight: 900;
      line-height: 1.42;
      opacity: 0;
      pointer-events: none;
      transform: translate(-8px, 8px) scale(0.96);
      box-shadow: 0 14px 30px rgba(48, 39, 28, 0.2);
      transition: opacity 300ms ease, transform 300ms ease;
      z-index: 4;
    }

    .hint-bubble::after {
      position: absolute;
      left: 18px;
      bottom: -11px;
      width: 20px;
      height: 20px;
      background: rgba(255, 250, 239, 0.94);
      border-right: 2px solid rgba(141, 109, 73, 0.38);
      border-bottom: 2px solid rgba(141, 109, 73, 0.38);
      content: "";
      transform: rotate(45deg) skew(8deg, 8deg);
    }

    .hint-bubble.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(0, 0) scale(1);
    }

    .hint-bubble:focus-visible {
      outline: none;
    }

    .message {
      position: absolute;
      left: 50%;
      top: 54%;
      min-width: min(72%, 360px);
      max-width: 76%;
      padding: 14px 18px;
      border-radius: 8px;
      display: block;
      text-align: center;
      font-size: clamp(15px, min(2.6vw, 3.2vh), 22px);
      font-weight: 900;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.96);
      box-shadow: 0 18px 40px rgba(22, 44, 66, 0.22);
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .message.is-visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .message.is-correct {
      background: rgba(230, 248, 237, 0.96);
      color: #087447;
    }

    .message.is-wrong {
      background: rgba(255, 246, 240, 0.96);
      color: #b42318;
    }

    .player {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .player.is-visible {
      display: block;
    }

    .player iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(20, 34, 48, 0.5);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.is-visible {
      display: grid;
    }

    .modal {
      width: min(100%, 390px);
      padding: 26px;
      border: 1px solid rgba(229, 216, 195, 0.9);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 250, 239, 0.98), rgba(232, 246, 255, 0.98)),
        #fff7e8;
      text-align: center;
      box-shadow: 0 26px 80px rgba(15, 23, 42, 0.26);
    }

    .modal h2 {
      margin: 0;
      color: #254964;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 950;
    }

    .modal p {
      margin: 14px 0 22px;
      color: #5f432a;
      font-size: 20px;
      line-height: 1.55;
      font-weight: 850;
    }

    .modal .hashtags {
      color: #276ea9;
      word-break: keep-all;
    }

    .modal-close {
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #276ea9, #185087);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 20px;
      font-weight: 900;
    }

    @media (max-width: 560px) {
      body {
        padding: 0;
      }

      .mission {
        width: min(112vw, calc(100vh * 1122 / 1402));
        max-width: none;
      }

      .answer-input {
        font-size: clamp(18px, 6.1vw, 28px);
      }

      .hint-bubble {
        left: 49%;
        top: 23.5%;
        width: 44%;
        padding: 10px 12px;
        font-size: clamp(12px, 3.25vw, 15px);
        line-height: 1.35;
        white-space: normal;
        word-break: keep-all;
        overflow-wrap: normal;
      }

      .hint-bubble::after {
        left: 34px;
        bottom: -10px;
        width: 18px;
        height: 18px;
      }

      .message {
        min-width: 68%;
        font-size: clamp(14px, 4vw, 18px);
      }
    }
  </style>
</head>
<body>
  <main class="mission" id="mission">
    <form class="answer-form" id="answerForm" aria-label="정답 입력">
      <label>
        <input class="answer-input" id="answerInput" type="text" placeholder="" autocomplete="off" autofocus style="margin-top: 5px;">
      </label>
      <button class="submit-hotspot" type="submit" aria-label="제출하기">제출하기</button>
      <button class="hint-hotspot" id="hintButton" type="button" aria-label="힌트보기">힌트보기</button>
      <button class="mascot-hotspot" id="mascotButton" type="button" aria-label="마스코트 힌트보기">마스코트 힌트보기</button>
      <button class="hint-bubble" id="hintBubble" type="button">힌트가 필요하면<br>나를 눌러줘!</button>
      <div class="message" id="message" role="status" aria-live="polite"></div>
    </form>
  </main>

  <div class="modal-backdrop" id="hintModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="hintTitle">
      <h2 id="hintTitle">힌트</h2>
      <p>ㅅㅂㄱ</p>
      <button class="modal-close" id="hintClose" type="button">닫기</button>
    </section>
  </div>

  <div class="modal-backdrop" id="successModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <h2 id="successTitle">정답입니다!</h2>
      <p>
        차갑게 얼어 있던 창고가 따뜻한<br/> 문화공간으로 녹았습니다!.<br>
        이 공간에서 가장 따뜻하게 느껴지는 <br/>장소를 찾아 사진을 찍고,<br>
        <span class="hashtags">#동빈문화창고1969 #녹다 <br/>#얼음땡</span><br>
        해시태그와 함께 개인 <br/>인스타그램에 올려주세요.
      </p>
      <button class="modal-close" id="successClose" type="button">사진 올리기</button>
    </section>
  </div>

  <section class="player" id="xrooPlayer" aria-label="XROO 공간">
    <iframe
      width="1920"
      height="1080"
      src="https://docs.google.com/forms/u/2/d/e/1FAIpQLScLENFe9a735V6-cf3qCLwx12vB0qhdNUrefgDhe3OztORIHg/viewform"
      frameborder="0"
      allow="autoplay; web-share"
      allowfullscreen>
    </iframe>
  </section>

  <script>
    const answers = ["송빙교"];
    const mission = document.querySelector("#mission");
    const form = document.querySelector("#answerForm");
    const input = document.querySelector("#answerInput");
    const message = document.querySelector("#message");
    const xrooPlayer = document.querySelector("#xrooPlayer");
    const hintButton = document.querySelector("#hintButton");
    const mascotButton = document.querySelector("#mascotButton");
    const hintBubble = document.querySelector("#hintBubble");
    const hintModal = document.querySelector("#hintModal");
    const hintClose = document.querySelector("#hintClose");
    const successModal = document.querySelector("#successModal");
    const successClose = document.querySelector("#successClose");
    let messageTimer;
    let hintBubbleTimer;
    let hasShownHintBubble = false;

    function normalize(value) {
      return value.replace(/\s/g, "");
    }

    function showMessage(text, type) {
      clearTimeout(messageTimer);
      message.textContent = text;
      message.className = `message is-visible is-${type}`;
      messageTimer = setTimeout(() => {
        message.classList.remove("is-visible");
      }, 1800);
    }

    function showHintBubble() {
      if (hasShownHintBubble) {
        return;
      }

      hasShownHintBubble = true;
      hintBubble.classList.add("is-visible");
    }

    function scheduleHintBubble() {
      if (hasShownHintBubble) {
        return;
      }

      clearTimeout(hintBubbleTimer);
      hintBubbleTimer = setTimeout(showHintBubble, 2500);
    }

    function openHint() {
      clearTimeout(hintBubbleTimer);
      hintBubble.classList.remove("is-visible");
      hintModal.classList.add("is-visible");
      hintModal.setAttribute("aria-hidden", "false");
      hintClose.focus();
    }

    function closeHint() {
      hintModal.classList.remove("is-visible");
      hintModal.setAttribute("aria-hidden", "true");
      input.focus();
    }

    function openSuccess() {
      successModal.classList.add("is-visible");
      successModal.setAttribute("aria-hidden", "false");
      successClose.focus();
    }

    function openPlayer() {
      successModal.classList.remove("is-visible");
      successModal.setAttribute("aria-hidden", "true");
      mission.hidden = true;
      document.body.classList.add("is-player-open");
      xrooPlayer.classList.add("is-visible");
    }

    hintButton.addEventListener("click", openHint);
    mascotButton.addEventListener("click", openHint);
    hintBubble.addEventListener("click", openHint);
    hintClose.addEventListener("click", closeHint);
    successClose.addEventListener("click", openPlayer);
    hintModal.addEventListener("click", (event) => {
      if (event.target === hintModal) {
        closeHint();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && hintModal.classList.contains("is-visible")) {
        closeHint();
      }
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (answers.includes(normalize(input.value))) {
        clearTimeout(hintBubbleTimer);
        hintBubble.classList.remove("is-visible");
        openSuccess();
        return;
      }

      showMessage("틀렸어요... 다시 생각해보세요.", "wrong");
      scheduleHintBubble();
      input.focus();
    });
  </script>
</body>
</html>
